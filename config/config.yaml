dashboard:
  host: "127.0.0.1"
  port: 5000
  refresh_seconds: 3

monitoring:
  low_battery_threshold: 20
  archive_after_days: 30
  log_level: "INFO"

robot:
  name: "Optimus Unit 1"
  main_battery_capacity_wh: 1000   # Optional: for better runtime estimation later

power_channels:
  - id: "Legs"
    name: "Leg Drive Motors"
    max_draw: 35
  - id: "Arms"
    name: "Arm + Gripper Systems"
    max_draw: 25
  - id: "Torso"
    name: "Torso & Balance Systems"
    max_draw: 20
  - id: "Compute"
    name: "Main Computer & Sensors"
    max_draw: 15

hardware:
  mode: "simulator"        # "simulator" or "real"