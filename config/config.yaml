dashboard:
  host: "127.0.0.1"
  port: 5000
  refresh_seconds: 3

monitoring:
  low_battery_threshold: 20
  archive_after_days: 30
  log_level: "INFO"
  archive_interval_hours: 24      # ← How often to run auto-archive (in background)

safety:
  low_battery_warning_pct: 20
  low_battery_critical_pct: 10
  spike_threshold_pct: 35
  over_draw_warning_pct: 92
  system_over_budget_pct: 98
  thermal_ambient_c: 22.0
  thermal_warning_c: 55.0
  thermal_critical_c: 68.0
  thermal_max_c: 75.0
  thermal_heating_factor: 0.78
  thermal_cooling_rate: 0.035
  twin_thermal_stress_mult: 1.9
  safety_throttle_factor: 0.85
  critical_throttle_factor: 0.70

lru:
  groups:
    - id: eps
      label: EPS (Power System)
      channels: ["Legs", "Arms", "Torso", "Compute", "Cooling"]
      degrade_priority: 5
      tier: 1
    - id: cooling
      label: Cooling (Dry Ice Loop)
      channels: ["Cooling"]
      degrade_priority: 2
      tier: 2
    - id: locomotion
      label: Locomotion (LRUA)
      channels: ["Legs"]
      degrade_priority: 3
      tier: 2
    - id: arms
      label: Arms
      channels: ["Arms"]
      degrade_priority: 1
      tier: 2
    - id: torso
      label: Torso
      channels: ["Torso"]
      degrade_priority: 2
      tier: 2
    - id: compute
      label: Compute
      channels: ["Compute"]
      degrade_priority: 4
      tier: 2
  thresholds:
    over_draw_warning_pct: 90
    spike_threshold_pct: 30
    voltage_sag_factor: 0.18
    low_voltage_warning_pct: 0.92
    low_voltage_critical_pct: 0.85
    degrade_throttle_caution: 0.92
    degrade_throttle_degraded: 0.80
    degrade_throttle_critical: 0.65

requirements:
  startup_cost_wh: 6.0
  eps_reserve_pct: 12
  system_min_draw_w: 18
  system_max_draw_w: 62
  lru_budgets:
    idle:
      locomotion: {min_draw_w: 2, max_draw_w: 12, budget_w: 6}
      arms: {min_draw_w: 4, max_draw_w: 18, budget_w: 8}
      torso: {min_draw_w: 3, max_draw_w: 14, budget_w: 6}
      compute: {min_draw_w: 6, max_draw_w: 12, budget_w: 9}
      cooling: {min_draw_w: 1, max_draw_w: 10, budget_w: 3}
    moving:
      locomotion: {min_draw_w: 14, max_draw_w: 28, budget_w: 22}
      arms: {min_draw_w: 5, max_draw_w: 18, budget_w: 10}
      torso: {min_draw_w: 7, max_draw_w: 14, budget_w: 11}
      compute: {min_draw_w: 6, max_draw_w: 12, budget_w: 9}
      cooling: {min_draw_w: 2, max_draw_w: 10, budget_w: 5}
    balanced:
      locomotion: {min_draw_w: 8, max_draw_w: 28, budget_w: 14}
      arms: {min_draw_w: 6, max_draw_w: 18, budget_w: 10}
      torso: {min_draw_w: 5, max_draw_w: 14, budget_w: 8}
      compute: {min_draw_w: 6, max_draw_w: 12, budget_w: 9}
      cooling: {min_draw_w: 2, max_draw_w: 10, budget_w: 4}
    high_load:
      locomotion: {min_draw_w: 18, max_draw_w: 28, budget_w: 26}
      arms: {min_draw_w: 12, max_draw_w: 18, budget_w: 17}
      torso: {min_draw_w: 8, max_draw_w: 14, budget_w: 12}
      compute: {min_draw_w: 7, max_draw_w: 12, budget_w: 10}
      cooling: {min_draw_w: 4, max_draw_w: 10, budget_w: 8}

robot:
  name: "ButlerBot"
  main_battery_capacity_wh: 480   # 48V ~10Ah — compact mobile robot pack
  hardware_profile: butlerbot_wheeled

hardware_profile: butlerbot_wheeled

power:
  system_budget_w: 62   # Total allocatable watts (includes active cooling)

cooling:
  max_draw_w: 10
  label: "Dry-ice / active cooling loop"

database:
  host: "localhost"
  port: 5432
  name: "robot_battery"
  user: "robot"
  password: "robot"

power_channels:
  - id: "Legs"
    name: "Leg Drive Motors"
    max_draw_w: 28        # 4–6 small leg servos under load
    nominal_voltage: 48
  - id: "Arms"
    name: "Arm + Gripper Systems"
    max_draw_w: 18
    nominal_voltage: 48
  - id: "Torso"
    name: "Torso & Balance Systems"
    max_draw_w: 14
    nominal_voltage: 48
  - id: "Compute"
    name: "Main Computer & Sensors"
    max_draw_w: 12
    nominal_voltage: 24
  - id: "Cooling"
    name: "Dry-Ice / Active Cooling Loop"
    max_draw_w: 10
    nominal_voltage: 24

digital_twin:
  enabled: true
  adapter: generic
  webots:
    dashboard_url: "http://127.0.0.1:5000"
    telemetry_interval_s: 0.5
  accept_external_commands: true
  accept_external_telemetry: true
  prefer_external: true
  stale_after_s: 12
  apply_battery_override: true
  sync_interval_s: 3

agent:
  enabled: true
  auto_apply_throttle: true
  auto_apply_task_suggestions: true
  twin_auto_apply: true
  history_limit: 32
  low_battery_suggest_pct: 22
  critical_battery_pct: 12
  high_utilization_pct: 72
  twin_stress_utilization_pct: 62
  task_override_hold_s: 14
  loop_margin_warn_pct: 18
  loop_margin_critical_pct: 8

simulation:
  enabled: true
  auto_start: true
  loop: true
  driver: butlerbot
  robot_name: ButlerBot
  battery_capacity_wh: 480
  script:
    - task: idle
      duration_s: 20
      label: "Idle / Standby"
    - task: moving
      duration_s: 28
      label: "Wheeled Transit"
    - task: balanced
      duration_s: 22
      label: "Balanced / Patrol"
    - task: high_load
      duration_s: 18
      label: "High Load / Manipulation"
    - task: idle
      duration_s: 14
      label: "Return to Idle"
  draw_profiles:
    idle:       {Legs: 3.5, Arms: 5.0, Torso: 3.5, Compute: 7.5, Cooling: 1.5}
    moving:     {Legs: 20.0, Arms: 8.0, Torso: 10.5, Compute: 9.0, Cooling: 4.0}
    balanced:   {Legs: 12.0, Arms: 9.0, Torso: 7.5, Compute: 8.5, Cooling: 3.5}
    high_load:  {Legs: 24.0, Arms: 16.0, Torso: 12.0, Compute: 10.0, Cooling: 7.5}

hardware:
  mode: "real"
  type: "ros2"
  ros2:
    node_name: "robot_battery_monitor"
    mock: false          # true = mock pub/sub even if rclpy is installed
    topics:
      main_battery: "/robot/battery/main_level"
      power_draw: "/robot/battery/power_draw"
      power_status: "/robot/battery/status"
      mission_command: "/robot/battery/command/mission"
      throttle_command: "/robot/battery/command/throttle"
      sensor_power: "/robot/sensors/power_draw"

# Other settings...
logging:
  level: "INFO"