# Future biped profile — logical power groups (not 27 individual channels).
# Maps ~27 DoF humanoid into 8 PMS channels for allocation and LRU monitoring.

profile_id: butlerbot_biped
label: "ButlerBot Biped (27-DoF abstract)"
description: >
  Full humanoid reference: 12 leg + 14 arm + 1 torso DoF collapsed into
  locomotion, manipulation, compute, and cooling groups. Use when Webots
  or hardware ships with legs instead of wheels.

battery:
  chemistry: Li-ion
  nominal_voltage_v: 48
  capacity_ah: 12
  capacity_wh: 576

compute:
  model: "Jetson AGX Orin class"
  idle_w: 12.0
  active_w: 18.0
  peak_w: 35.0
  nominal_voltage_v: 24

# Abstract channel caps (8 logical LRUs)
channels:
  Legs:
    description: "12-DoF leg stack (6 per side)"
    max_draw_w: 45
    nominal_voltage_v: 48
    dof: 12
  Arms:
    description: "14-DoF dual arms (7 per side)"
    max_draw_w: 32
    nominal_voltage_v: 48
    dof: 14
  Torso:
    description: "Waist / pelvis / balance (1-3 DoF)"
    max_draw_w: 22
    nominal_voltage_v: 48
    dof: 3
  Hands:
    description: "Gripper / end-effector budget"
    max_draw_w: 14
    nominal_voltage_v: 24
    dof: 2
  Head:
    description: "Neck pan/tilt + vision ring"
    max_draw_w: 10
    nominal_voltage_v: 24
    dof: 2
  Compute:
    description: "Main computer, lidar, IMU"
    max_draw_w: 18
    nominal_voltage_v: 24
    dof: 0
  Cooling:
    description: "Dry-ice / liquid cooling loop"
    max_draw_w: 14
    nominal_voltage_v: 24
    dof: 0
  Aux:
    description: "Comms, lighting, misc"
    max_draw_w: 8
    nominal_voltage_v: 24
    dof: 0

phase_draw_w:
  standby: 28.0
  walk_transit: 78.0
  patrol: 62.0
  manipulate: 88.0
  return_idle: 32.0

phase_duration_s:
  standby: 6
  walk_transit: 16
  patrol: 14
  manipulate: 12
  return_idle: 10