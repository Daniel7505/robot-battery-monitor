[pytest]
# Nice colored output + shorter tracebacks
addopts = 
    -v
    --tb=short
    --color=yes
    -ra

# Ignore some noisy warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Where to look for tests
testpaths = tests